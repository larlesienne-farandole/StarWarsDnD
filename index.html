<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outer Rim Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'Aurebesh AF';font-style:normal;font-weight:700;font-display:swap;
  src:url(https://cdn.jsdelivr.net/gh/LogicismDev/aurebesh-discord-font/fonts/AurebeshAF-Canon.woff2) format("woff2");
}
:root{
  --void:#070b10;
  --hull:#0e151d;
  --panel:#131c26;
  --line:#22303e;
  --holo:#5fd3f2;
  --ice:#a8dff5;
  --steel:#7d94a8;
  --text:#c9d6e2;
  --dim:#647889;
  --alert:#e2555a;
  --chamfer:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--void);color:var(--text);
  font-family:'Barlow',system-ui,sans-serif;font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(to bottom,rgba(95,211,242,.035) 0 1px,transparent 1px 3px);
  mix-blend-mode:screen;
}
.aur{font-family:'Aurebesh AF','Chakra Petch',sans-serif;font-weight:700}
.chamfer{clip-path:polygon(var(--chamfer) 0,100% 0,100% calc(100% - var(--chamfer)),calc(100% - var(--chamfer)) 100%,0 100%,0 var(--chamfer))}

.shell{display:grid;grid-template-columns:216px 1fr;min-height:100vh;max-width:1400px;margin:0 auto}

/* rail */
.rail{border-right:1px solid var(--line);background:var(--hull);padding:22px 0 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.crest{padding:0 18px 20px}
.crest .aur{font-size:20px;color:var(--holo);letter-spacing:.06em;line-height:1.3;display:block}
.crest h1{
  font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;letter-spacing:.2em;
  text-transform:uppercase;margin:9px 0 0;color:#e8f4fb;
}
.crest .sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:5px}
nav{display:flex;flex-direction:column;padding:0 10px}
.tab{
  all:unset;cursor:pointer;display:flex;align-items:baseline;gap:10px;
  padding:9px 12px;font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-left:2px solid transparent;
}
.tab:hover{color:var(--text);background:rgba(95,211,242,.05)}
.tab:focus-visible{outline:1px solid var(--holo);outline-offset:-1px}
.tab[aria-selected="true"]{color:var(--ice);border-left-color:var(--holo);background:rgba(95,211,242,.08)}
.tab .n{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;color:var(--dim)}
.railfoot{margin-top:26px;padding:14px 18px;border-top:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.08em}
.pulse{display:inline-block;width:6px;height:6px;background:var(--holo);border-radius:50%;margin-right:7px;animation:blip 2.4s infinite}
@keyframes blip{0%,45%{opacity:1}50%,100%{opacity:.2}}

/* main */
main{padding:26px 30px 70px;min-width:0}
.head{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.head .aur{display:block;font-size:34px;color:var(--ice);letter-spacing:.05em;line-height:1}
.head .latin{font-family:'Chakra Petch',sans-serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--steel);margin-top:9px}
.bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.search{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;gap:9px;padding:9px 13px}
.search:focus-within{border-color:var(--holo)}
.search input{all:unset;flex:1;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px}
.search input::placeholder{color:var(--dim)}
.search span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--holo)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{all:unset;cursor:pointer;padding:7px 13px;border:1px solid var(--line);background:var(--panel);
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.07em;color:var(--dim);text-transform:uppercase}
.chip:hover{color:var(--text);border-color:#31445a}
.chip:focus-visible{outline:1px solid var(--holo);outline-offset:2px}
.chip[aria-pressed="true"]{color:var(--void);background:var(--ice);border-color:var(--ice);font-weight:500}

/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(292px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);padding:16px 17px 15px;position:relative;transition:border-color .15s,transform .15s}
.card:hover{border-color:#334a61;transform:translateY(-2px)}
.card .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--steel);text-transform:uppercase}
.card h3{font-family:'Chakra Petch',sans-serif;font-size:17px;font-weight:600;letter-spacing:.03em;margin:6px 0 3px;color:#e8f4fb}
.card .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:9px}
.card p{margin:0;font-size:14px;color:var(--text)}
.stats{display:flex;gap:16px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);flex-wrap:wrap}
.stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim)}
.stat b{display:block;color:var(--holo);font-weight:500;font-size:13px;margin-top:2px}
.flag{position:absolute;top:0;right:0;padding:3px 9px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase}
.flag.active{background:rgba(95,211,242,.14);color:var(--holo)}
.flag.dead,.flag.hostile{background:rgba(226,85,90,.14);color:var(--alert)}
.flag.mark{background:rgba(168,223,245,.12);color:var(--ice)}
.empty{padding:60px 0;text-align:center;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em}

/* session log */
.log{border-top:1px solid var(--line)}
.entry{display:grid;grid-template-columns:104px 1fr;gap:20px;padding:16px 4px;border-bottom:1px solid var(--line)}
.entry .date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--holo);letter-spacing:.06em}
.entry h3{font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:600;margin:0 0 5px;color:#e8f4fb}
.entry .party{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-top:8px}

@media(max-width:800px){
  .shell{grid-template-columns:1fr}
  .rail{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}
  nav{flex-direction:row;overflow-x:auto;padding-bottom:4px}
  .tab{border-left:none;border-bottom:2px solid transparent;white-space:nowrap}
  .tab[aria-selected="true"]{border-left-color:transparent;border-bottom-color:var(--holo)}
  .tab .n{display:none}
  .railfoot{display:none}
  main{padding:20px 16px 60px}
  .head .aur{font-size:26px}
  .entry{grid-template-columns:1fr;gap:6px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="shell">
  <aside class="rail">
    <div class="crest">
      <span class="aur">Outer Rim</span>
      <h1>Outer Rim Archive</h1>
      <div class="sub">Campaign Records</div>
    </div>
    <nav role="tablist" id="nav"></nav>
    <div class="railfoot"><span class="pulse"></span><span id="clock">LINK ACTIVE</span></div>
  </aside>

  <main>
    <div class="head">
      <span class="aur" id="headAur"></span>
      <div class="latin" id="headLatin"></div>
    </div>
    <div class="bar">
      <label class="search chamfer">
        <span>&gt;</span>
        <input id="q" type="search" placeholder="Search records" autocomplete="off">
      </label>
      <div class="chips" id="chips"></div>
    </div>
    <div id="view"></div>
  </main>
</div>

<script>
/* ============================================================
   CAMPAIGN DATA — edit below. Everything else is the interface.
   ============================================================ */
const DATA = {
  characters: {
    label: "Characters",
    filterKey: "status",
    items: [
      { name:"Vess Talin", eyebrow:"Twi'lek · Scoundrel", status:"Active", player:"Mara",
        blurb:"Ex-Hutt courier who kept the ship and lost the debt. Talks first, shoots during.",
        stats:{ Level:"4", Credits:"2,150", Sessions:"7" } },
      { name:"Dorn Kesh", eyebrow:"Human · Guardian", status:"Active", player:"Jae",
        blurb:"Former Imperial cadet. Carries a lightsaber he has not earned and knows it.",
        stats:{ Level:"5", Credits:"640", Sessions:"9" } },
      { name:"RK-9 'Rook'", eyebrow:"Droid · Technician", status:"Active", player:"Sam",
        blurb:"Astromech chassis with an unlicensed personality matrix. Refuses to fly cargo.",
        stats:{ Level:"3", Credits:"3,900", Sessions:"5" } },
      { name:"Ilya Sarn", eyebrow:"Mirialan · Seeker", status:"Missing", player:"Ben",
        blurb:"Walked into the Kessa ruins alone. The party found her pack, nothing else.",
        stats:{ Level:"4", Credits:"0", Sessions:"6" } }
    ]
  },
  npcs: {
    label: "NPCs",
    filterKey: "disposition",
    items: [
      { name:"Broker Yuvel", eyebrow:"Fixer · Nar Kaas Spaceport", disposition:"Friendly",
        blurb:"Runs work off a datapad in the cantina back booth. Pays on delivery, never before.",
        stats:{ Faction:"Independent", Met:"S1" } },
      { name:"Captain Renn Vok", eyebrow:"Imperial Officer · ISD Vigil", disposition:"Hostile",
        blurb:"Has the party's transponder codes. Patrols the Kessa lane on a fixed rotation.",
        stats:{ Faction:"Empire", Met:"S4" } },
      { name:"Old Nhala", eyebrow:"Archivist · Temple Ruin", disposition:"Neutral",
        blurb:"Trades information for salvaged holocrons. Will not discuss what she keeps below.",
        stats:{ Faction:"Unknown", Met:"S6" } }
    ]
  },
  locations: {
    label: "Locations",
    filterKey: "state",
    items: [
      { name:"Nar Kaas", eyebrow:"Spaceport · Home Base", state:"Charted",
        blurb:"Dust, fuel, and four rival crews. Safe enough if nobody owes anybody.",
        stats:{ Sector:"Bavva", Danger:"1" } },
      { name:"Kessa Ruins", eyebrow:"Jungle Moon · Site 12", state:"Charted",
        blurb:"Pre-Republic stonework under the canopy. Something below still has power.",
        stats:{ Sector:"Bavva", Danger:"4" } },
      { name:"The Sundered Belt", eyebrow:"Asteroid Field", state:"Uncharted",
        blurb:"Three wrecks on scan, no beacons. Nobody who charted it has come back to say so.",
        stats:{ Sector:"Outer", Danger:"5" } }
    ]
  },
  sessions: {
    label: "Sessions",
    layout: "log",
    items: [
      { date:"12 · 07 · 26", name:"The Vigil Rotation", party:"Vess, Dorn, Rook",
        blurb:"Slipped a customs sweep with forged codes, then sold the real ones to Yuvel. Vok now has a description." },
      { date:"05 · 07 · 26", name:"Descent at Site 12", party:"Dorn, Rook, Ilya",
        blurb:"Opened the lower chamber. Ilya went ahead of the group and did not return to the surface." },
      { date:"28 · 06 · 26", name:"Cargo, No Questions", party:"Vess, Ilya",
        blurb:"Ran unmarked crates to the belt edge. Crates were breathing. Paid 1,200 each, nobody asked." }
    ]
  },
  items: {
    label: "Armory",
    filterKey: "rarity",
    items: [
      { name:"Kessa Holocron Shard", eyebrow:"Artifact", rarity:"Unique",
        blurb:"Projects a partial star map. Runs hot when carried near the ruins.",
        stats:{ Holder:"Rook", Value:"—" } },
      { name:"Modified DL-44", eyebrow:"Blaster Pistol", rarity:"Rare",
        blurb:"Overcharged pack, scorched grip. Fires twice before it needs a full minute.",
        stats:{ Holder:"Vess", Value:"1,800" } },
      { name:"Imperial Codebreaker", eyebrow:"Slicing Tool", rarity:"Common",
        blurb:"Two charges left. Each use flags a low-priority alert somewhere.",
        stats:{ Holder:"Party", Value:"400" } }
    ]
  }
};
/* ========================= end data ========================= */

const nav=document.getElementById('nav'), view=document.getElementById('view'),
      chips=document.getElementById('chips'), q=document.getElementById('q'),
      headAur=document.getElementById('headAur'), headLatin=document.getElementById('headLatin');
let tab=Object.keys(DATA)[0], filter='All';

Object.entries(DATA).forEach(([k,s])=>{
  const b=document.createElement('button');
  b.className='tab'; b.role='tab'; b.dataset.k=k;
  b.innerHTML=`${s.label}<span class="n">${String(s.items.length).padStart(2,'0')}</span>`;
  b.onclick=()=>{tab=k;filter='All';q.value='';render()};
  nav.appendChild(b);
});

const flagClass=v=>({Active:'active',Friendly:'active',Charted:'active',
  Missing:'dead',Deceased:'dead',Hostile:'hostile'}[v]||'mark');

function render(){
  [...nav.children].forEach(b=>b.setAttribute('aria-selected',b.dataset.k===tab));
  const sec=DATA[tab], key=sec.filterKey;

  headAur.textContent=sec.label;
  headLatin.textContent=sec.label+' · '+sec.items.length+' records';

  chips.innerHTML='';
  if(key){
    const vals=['All',...new Set(sec.items.map(i=>i[key]))];
    vals.forEach(v=>{
      const c=document.createElement('button');
      c.className='chip'; c.textContent=v; c.setAttribute('aria-pressed',v===filter);
      c.onclick=()=>{filter=v;render()};
      chips.appendChild(c);
    });
  }

  const term=q.value.toLowerCase();
  const rows=sec.items.filter(i=>
    (filter==='All'||i[key]===filter) &&
    JSON.stringify(i).toLowerCase().includes(term));

  if(!rows.length){view.innerHTML='<div class="empty">No records match. Adjust the search.</div>';return}

  if(sec.layout==='log'){
    view.innerHTML='<div class="log">'+rows.map(i=>`
      <article class="entry">
        <div class="date">${i.date}</div>
        <div><h3>${i.name}</h3><p>${i.blurb}</p>
        <div class="party">PARTY · ${i.party}</div></div>
      </article>`).join('')+'</div>';
    return;
  }

  view.innerHTML='<div class="grid">'+rows.map(i=>{
    const f=key?i[key]:null;
    const st=i.stats?Object.entries(i.stats).map(([k2,v])=>
      `<div class="stat">${k2}<b>${v}</b></div>`).join(''):'';
    return `<article class="card chamfer">
      ${f?`<div class="flag ${flagClass(f)}">${f}</div>`:''}
      <div class="eyebrow">${i.eyebrow||''}</div>
      <h3>${i.name}</h3>
      ${i.player?`<div class="meta">Played by ${i.player}</div>`:''}
      <p>${i.blurb}</p>
      ${st?`<div class="stats">${st}</div>`:''}
    </article>`;
  }).join('')+'</div>';
}
q.oninput=render;
render();

const total=Object.values(DATA).reduce((n,s)=>n+s.items.length,0);
document.getElementById('clock').textContent=`${total} RECORDS ON FILE`;
</script>
</body>
</html>
