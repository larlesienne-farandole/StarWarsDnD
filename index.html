<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outer Rim Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'Aurebesh AF';font-style:normal;font-weight:700;font-display:swap;
  src:url(https://cdn.jsdelivr.net/gh/LogicismDev/aurebesh-discord-font/fonts/AurebeshAF-Canon.woff2) format("woff2");
}
:root{
  --bg:#000000;
  --panel:#000000;
  --panel-hi:#000000;
  --edge:rgba(255,255,255,.22);
  --white:#ffffff;
  --gray:#b9bcbe;
  --dim:#7e8285;
  --gold:#ffb020;
  --gold-hi:#ffc74d;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--gray);
  font-family:'Barlow',system-ui,sans-serif;font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100vh;position:relative;overflow-x:hidden;
}
/* ambient vertical light columns */
.wrap{position:relative;z-index:2;max-width:1560px;margin:0 auto;padding:0 34px 70px}

/* top bar */
header{display:flex;align-items:center;gap:26px;padding:20px 0 0;flex-wrap:wrap}
.brand{display:flex;align-items:center;padding-right:22px;border-right:1px solid var(--edge)}
.brand img{height:58px;width:auto;display:block}
nav{display:flex;gap:4px;flex-wrap:wrap}
.tab{
  all:unset;cursor:pointer;padding:12px 26px;background:transparent;border:1px solid var(--edge);
  font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:16px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--gray);transition:background .12s,color .12s,border-color .12s,box-shadow .12s;
}
.tab:hover{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28),inset 0 0 26px rgba(255,176,32,.10)}
.tab:focus-visible{outline:1px solid var(--gold-hi);outline-offset:2px}
.tab[aria-selected="true"]{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28),inset 0 0 26px rgba(255,176,32,.10)}
.tab .n{font-family:'Barlow',sans-serif;font-weight:500;font-size:12px;color:var(--dim);margin-left:9px;letter-spacing:.04em}
.tab[aria-selected="true"] .n{color:var(--gold)}
.tab:hover .n{color:var(--gold)}

/* filter row */
.bar{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;margin:26px 0 20px}
.search{flex:1;min-width:240px;display:flex;align-items:center;gap:11px;padding:10px 16px;
  background:transparent;border:1px solid var(--edge);border:1px solid transparent;transition:border-color .12s}
.search:hover,.search:focus-within{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.24)}
.search input{all:unset;flex:1;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px}
.search input::placeholder{color:var(--dim)}
.search span{color:var(--gold);font-family:'Barlow Semi Condensed',sans-serif;font-weight:700}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{all:unset;cursor:pointer;padding:10px 20px;background:transparent;border:1px solid var(--edge);
  font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--dim);transition:background .12s,color .12s,border-color .12s,box-shadow .12s}
.chip:hover{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28),inset 0 0 26px rgba(255,176,32,.10)}
.chip:focus-visible{outline:1px solid var(--gold-hi);outline-offset:2px}
.chip[aria-pressed="true"]{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28),inset 0 0 26px rgba(255,176,32,.10)}

/* card grid — Battlefront panel treatment */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:8px}
.card{
  position:relative;background:#000;min-height:330px;
  border:1px solid var(--edge);padding:30px 30px 26px;display:flex;flex-direction:column;
  transition:border-color .14s,box-shadow .14s,background .14s;
}
.card::after{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .14s;
  background:repeating-linear-gradient(to bottom,rgba(255,176,32,.07) 0 1px,transparent 1px 3px);
}
.card:hover{
  border-color:var(--gold);background:rgba(255,176,32,.07);
  box-shadow:0 0 0 1px var(--gold),0 0 26px rgba(255,176,32,.28),inset 0 0 34px rgba(255,176,32,.10);
}
.card:hover::after{opacity:1}
.card:hover h3{color:var(--gold);text-shadow:0 0 18px rgba(255,176,32,.55)}
.card:hover .flag{color:var(--gold-hi)}
.card:hover .aur{color:var(--gold-hi);opacity:.75}
.card:hover .stat b{color:var(--gold-hi)}
.card .aur{font-family:'Aurebesh AF',sans-serif;font-size:12px;color:var(--dim);letter-spacing:.06em;
  display:block;margin-bottom:5px;padding-right:104px;line-height:1.5;transition:color .14s}
.card h3{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:32px;letter-spacing:.02em;
  text-transform:uppercase;color:var(--white);margin:0 0 8px;line-height:1.04;transition:color .14s,text-shadow .14s}
.card .eyebrow{font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);font-weight:500}
.card .meta{font-size:13.5px;color:var(--dim);margin-top:8px}
.card p{margin:18px 0 0;font-size:15px;color:var(--gray);line-height:1.6}
.stats{display:flex;gap:30px;margin-top:auto;padding-top:26px;flex-wrap:wrap}
.stat{font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);font-weight:500}
.stat b{display:block;font-weight:700;font-size:17px;letter-spacing:.06em;color:var(--white);
  border-bottom:1px solid var(--edge);padding-bottom:3px;margin-top:3px;transition:color .14s}
.flag{position:absolute;top:30px;right:30px;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;
  font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);transition:color .14s}
.flag.off{color:var(--white)}
.empty{padding:80px 0;text-align:center;color:var(--dim);font-family:'Barlow Semi Condensed',sans-serif;
  font-size:16px;letter-spacing:.2em;text-transform:uppercase}

/* session log */
.log{display:flex;flex-direction:column;gap:8px}
.entry{position:relative;display:grid;grid-template-columns:150px 1fr;gap:28px;padding:22px 26px;
  background:#000;border:1px solid var(--edge);transition:border-color .14s,box-shadow .14s,background .14s}
.entry:hover{border-color:var(--gold);background:rgba(255,176,32,.07);
  box-shadow:0 0 0 1px var(--gold),0 0 26px rgba(255,176,32,.28)}
.entry:hover h3{color:var(--gold);text-shadow:0 0 18px rgba(255,176,32,.55)}
.entry .date{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:14px;
  letter-spacing:.14em;color:var(--dim)}
.entry h3{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:.02em;
  text-transform:uppercase;color:var(--white);margin:0 0 8px;line-height:1;transition:color .14s,text-shadow .14s}
.entry .party{font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);margin-top:12px;border-top:1px solid var(--edge);padding-top:10px;display:inline-block}

/* footer prompt bar, like the console hint row */
.prompt{display:flex;align-items:center;gap:12px;margin-top:26px;padding-top:16px;border-top:1px solid var(--edge);
  font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.prompt i{font-style:normal;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
  border:1px solid var(--edge);border-radius:50%;font-size:11px;color:var(--gray)}


/* ---------- home ---------- */
.home{display:grid;grid-template-columns:1.6fr 1fr;gap:8px;margin-top:26px}
.home .tile{position:relative;display:flex;flex-direction:column;justify-content:flex-end;
  background:#000;border:1px solid var(--edge);padding:26px;text-align:left;cursor:pointer;
  transition:border-color .14s,box-shadow .14s,background .14s;min-height:180px}
.home .tile::after,.camprow .tile::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .14s;
  background:repeating-linear-gradient(to bottom,rgba(255,176,32,.07) 0 1px,transparent 1px 3px)}
.home .tile:hover,.home .tile:focus-visible,.camprow .tile:hover,.camprow .tile:focus-visible{border-color:var(--gold);background:rgba(255,176,32,.07);
  box-shadow:0 0 0 1px var(--gold),0 0 26px rgba(255,176,32,.28),inset 0 0 34px rgba(255,176,32,.10);outline:none}
.home .tile:hover::after,.home .tile:focus-visible::after,.camprow .tile:hover::after,.camprow .tile:focus-visible::after{opacity:1}
.home .tile:hover h3,.home .tile:focus-visible h3,.camprow .tile:hover h3,.camprow .tile:focus-visible h3{color:var(--gold);text-shadow:0 0 18px rgba(255,176,32,.55)}
.home .tile:hover .aur,.home .tile:focus-visible .aur,.camprow .tile:hover .aur,.camprow .tile:focus-visible .aur{color:var(--gold-hi);opacity:.75}
.home .tile:hover .foot,.home .tile:focus-visible .foot,.camprow .tile:hover .foot,.camprow .tile:focus-visible .foot{color:var(--gold-hi);border-color:var(--gold)}
.home .aur,.camprow .aur{font-family:'Aurebesh AF',sans-serif;font-size:12px;color:var(--dim);letter-spacing:.06em;
  display:block;margin-bottom:5px;padding-right:230px;line-height:1.5;transition:color .14s}
.home .eyebrow,.camprow .eyebrow{font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);font-weight:500;display:block;margin-top:6px}
.tag{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;
  font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  border:1px solid var(--gold);padding:3px 10px;white-space:nowrap}
.home h3,.camprow h3{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;letter-spacing:.02em;
  text-transform:uppercase;color:var(--white);margin:0;line-height:1;transition:color .14s,text-shadow .14s;font-size:30px}
.home p,.camprow p{margin:12px 0 0;font-size:14.5px;color:var(--gray);line-height:1.55;max-width:46ch}
.home .foot,.camprow .foot{font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);border-top:1px solid var(--edge);padding-top:9px;margin-top:20px;
  display:flex;justify-content:space-between;gap:14px;transition:color .14s,border-color .14s}
.home .feature{grid-row:span 3;min-height:420px}
.home .feature h3{font-size:44px}
.home .feature p{font-size:16px}

/* ---------- tile background image (hover only) ---------- */
.tile .bgimg{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity .18s;pointer-events:none;z-index:0}
.tile .bgimg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(to top,#000 0%,rgba(0,0,0,.94) 28%,rgba(0,0,0,.62) 58%,rgba(0,0,0,.30) 100%)}
.tile:hover .bgimg,.tile:focus-visible .bgimg{opacity:1}
.tile .aur,.tile h3,.tile .eyebrow,.tile p,.tile .foot{position:relative;z-index:2}
.tile .tags{z-index:3}
.tile::after{z-index:1}
.tile .tiletools{position:absolute;top:22px;left:26px;z-index:4;display:none}
body:not(.editing) .tile .tiletools{display:none}
.tile .tiletools .tbtn{background:#000;padding:3px 10px;font-size:12px;letter-spacing:.18em;
  line-height:1.5;border-color:var(--edge);color:var(--dim)}
.tile .tiletools .tbtn:hover{color:var(--gold-hi);border-color:var(--gold)}
body.editing .tile{padding-top:72px}
body.editing .tile .aur{padding-right:0}

/* ---------- campaigns ---------- */
.camps{margin-top:26px;display:flex;flex-direction:column;gap:54px}
.group{display:block}
.grouphead{border-bottom:1px solid var(--edge);padding-bottom:11px;margin-bottom:14px}
.grouphead h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:22px;
  letter-spacing:.18em;text-transform:uppercase;color:var(--white);margin:0}
.camprow{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.camprow .tile{position:relative;display:flex;flex-direction:column;justify-content:flex-start;
  background:#000;border:1px solid var(--edge);padding:26px;text-align:left;cursor:pointer;
  transition:border-color .14s,box-shadow .14s,background .14s;min-height:230px}
.camps .home{grid-template-columns:1fr;margin-top:0}
.camps .home .feature{grid-row:auto;min-height:300px}
.tags{position:absolute;top:22px;right:26px;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* campaigns tiles align their titles regardless of copy length */
.camprow .aur{min-height:3em;margin-bottom:8px}
.camprow p{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:3.1em;margin-bottom:22px}
.camprow .foot{margin-top:auto}

/* ---------- detail view ---------- */
.detail{margin-top:8px}
.back{all:unset;cursor:pointer;padding:8px 18px;border:1px solid var(--edge);margin-bottom:8px;
  display:inline-block;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:13px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--gray);
  transition:background .12s,color .12s,border-color .12s,box-shadow .12s}
.back:hover,.back:focus-visible{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28)}
.sheetview{border:1px solid var(--edge);background:#000;padding:38px 40px 34px;position:relative}
.sheetview .aur{font-family:'Aurebesh AF',sans-serif;font-size:14px;color:var(--dim);letter-spacing:.06em;
  display:block;margin-bottom:8px;padding-right:120px;line-height:1.5}
.sheetview h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:52px;letter-spacing:.02em;
  text-transform:uppercase;color:var(--white);margin:0;line-height:1}
.sheetview .eyebrow{font-family:'Barlow Semi Condensed',sans-serif;font-size:15px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);font-weight:500;display:block;margin-top:10px}
.sheetview .meta{font-size:14px;color:var(--dim);margin-top:8px}
.sheetview .lede{font-size:17px;color:var(--gray);line-height:1.6;margin:24px 0 0;max-width:70ch}
.sheetview .body{margin-top:20px;max-width:70ch}
.sheetview .body p{font-size:15px;color:var(--gray);line-height:1.7;margin:0 0 14px}
.sheetview .stats{gap:44px;padding-top:28px;margin-top:30px;border-top:1px solid var(--edge)}
.sheetview .stat b{font-size:24px}
.sheetview .flag{top:38px;right:40px;font-size:13px}
.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:30px;padding-top:26px;border-top:1px solid var(--edge)}
button.link{appearance:none;-webkit-appearance:none;background:transparent;cursor:pointer;
  line-height:inherit;margin:0}
.link{display:inline-block;padding:10px 20px;border:1px solid var(--edge);text-decoration:none;
  background:transparent;
  font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gray);transition:background .12s,color .12s,border-color .12s,box-shadow .12s}
.link:hover,.link:focus-visible{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28);outline:none}
.card{cursor:pointer}
@media(max-width:860px){
  .sheetview{padding:24px}
  .sheetview h2{font-size:32px}
  .sheetview .aur{padding-right:0}
  .sheetview .flag{position:static;display:block;margin-bottom:10px}
}
.blankslate{margin-top:34px;padding-top:26px;border-top:1px solid var(--edge);
  font-family:'Barlow Semi Condensed',sans-serif;font-size:14px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim)}

/* ---------- hologram ---------- */
.holostage{
  --h-hue:160deg; --h-sat:3.4; --h-bright:1.08; --h-contrast:1.25; --h-alpha:.88;
  --h-glow:26px; --h-gap:3px; --h-strength:.16; --h-scan:2.4s; --h-sweep:4.5s;
  --h-split:1.4px; --h-tint:#7fd8ff;
  border:1px solid var(--edge);border-top:none;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:44px 30px 0;overflow:hidden;position:relative;
}
.holostage.open{display:flex}
.holostage .rig{position:relative;width:min(380px,72%);margin-bottom:34px;isolation:isolate}
.holostage .holo{position:relative;display:block;width:100%;
  -webkit-mask-image:linear-gradient(to right,transparent 0,#000 4%,#000 96%,transparent 100%),
                     linear-gradient(to top,transparent 0,#000 5%,#000 97%,transparent 100%);
  -webkit-mask-composite:source-in;
  mask-image:linear-gradient(to right,transparent 0,#000 4%,#000 96%,transparent 100%),
             linear-gradient(to top,transparent 0,#000 5%,#000 97%,transparent 100%);
  mask-composite:intersect;
  animation:h-drift 7s ease-in-out infinite, h-flicker 6s steps(1,end) infinite}
.holostage .holo img{display:block;width:100%;height:auto}
.holostage .layer{position:absolute;inset:0}
.holostage .layer img{display:block;width:100%;height:auto}
.holostage .bloom img{
  filter:grayscale(1) brightness(1.2) contrast(1.1)
         sepia(1) hue-rotate(var(--h-hue)) saturate(var(--h-sat)) blur(calc(var(--h-glow) / 2));
  opacity:calc(var(--h-glow) / 90);mix-blend-mode:screen}
.holostage .base img{
  filter:grayscale(1) brightness(var(--h-bright)) contrast(var(--h-contrast))
         sepia(1) hue-rotate(var(--h-hue)) saturate(var(--h-sat));
  opacity:var(--h-alpha);mix-blend-mode:screen}
.holostage .split-a img,.holostage .split-b img{
  filter:grayscale(1) contrast(1.3) sepia(1) hue-rotate(var(--h-hue)) saturate(6);
  opacity:.35;mix-blend-mode:screen}
.holostage .split-a{transform:translateX(calc(var(--h-split) * -1));
  animation:h-jitter-a 3.7s steps(1,end) infinite}
.holostage .split-b{transform:translateX(var(--h-split));
  animation:h-jitter-b 4.3s steps(1,end) infinite}
.holostage .scan{
  background:repeating-linear-gradient(to bottom,
    rgba(255,255,255,var(--h-strength)) 0 1px,transparent 1px var(--h-gap));
  mix-blend-mode:overlay;animation:h-roll var(--h-scan) linear infinite}
.holostage .sweep{
  background:linear-gradient(to bottom,transparent 0%,
    color-mix(in srgb,var(--h-tint) 55%,transparent) 45%,
    color-mix(in srgb,#fff 65%,transparent) 50%,
    color-mix(in srgb,var(--h-tint) 55%,transparent) 55%,transparent 100%);
  background-size:100% 42%;background-repeat:no-repeat;mix-blend-mode:screen;opacity:.5;
  animation:h-sweep var(--h-sweep) linear infinite}
.holostage .mask{-webkit-mask-size:100% 100%;mask-size:100% 100%;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat}
.holostage .rig::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:34%;pointer-events:none;z-index:5;
  background:linear-gradient(to top,#000 0%,rgba(0,0,0,.92) 18%,rgba(0,0,0,.65) 38%,
    rgba(0,0,0,.32) 62%,rgba(0,0,0,.10) 82%,transparent 100%)}
.holostage .emitter{position:relative;width:min(380px,72%);height:76px;flex:0 0 auto;margin-bottom:56px}
.holostage .cone{position:absolute;left:50%;bottom:34px;width:78%;height:300px;transform:translateX(-50%);
  background:linear-gradient(to top,color-mix(in srgb,var(--h-tint) 26%,transparent),transparent 78%);
  clip-path:polygon(50% 100%,10% 0,90% 0);filter:blur(14px);opacity:.5;pointer-events:none;
  -webkit-mask-image:linear-gradient(to top,#000 0%,rgba(0,0,0,.55) 45%,transparent 92%);
  mask-image:linear-gradient(to top,#000 0%,rgba(0,0,0,.55) 45%,transparent 92%)}
.holostage .disc{position:absolute;left:50%;bottom:26px;width:62%;height:26px;transform:translateX(-50%);
  border-radius:50%;background:radial-gradient(ellipse at center,
    color-mix(in srgb,var(--h-tint) 85%,transparent) 0%,
    color-mix(in srgb,var(--h-tint) 22%,transparent) 55%,transparent 72%);
  filter:blur(4px);animation:h-pulse 3.4s ease-in-out infinite}

@keyframes h-roll{to{background-position:0 calc(var(--h-gap) * 14)}}
@keyframes h-sweep{0%{background-position:0 -60%}70%{background-position:0 130%}100%{background-position:0 130%}}
@keyframes h-drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes h-flicker{0%,92%{opacity:1}93%{opacity:.72}94%{opacity:1}96%{opacity:.85}97%,100%{opacity:1}}
@keyframes h-jitter-a{0%,88%{transform:translateX(calc(var(--h-split) * -1))}
  89%{transform:translateX(calc(var(--h-split) * -4)) translateY(2px)}
  90%,100%{transform:translateX(calc(var(--h-split) * -1))}}
@keyframes h-jitter-b{0%,82%{transform:translateX(var(--h-split))}
  83%{transform:translateX(calc(var(--h-split) * 4)) translateY(-2px)}
  84%,100%{transform:translateX(var(--h-split))}}
@keyframes h-pulse{0%,100%{opacity:.75;transform:translateX(-50%) scaleX(1)}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.05)}}

/* tuning panel, edit mode only */
.holoempty{padding:34px 0 46px;text-align:center;max-width:420px}
.holoempty .ebtn{display:inline-block;cursor:pointer}
.holoempty .note{font-size:13px;color:var(--dim);line-height:1.55;margin:14px 0 0}
.holotune{display:none;width:100%;max-width:760px;margin:0 auto;padding:22px 0 30px;
  border-top:1px solid var(--edge)}
body.editing .holostage.open .holotune{display:block}
.holotune .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px 22px}
.holotune .row label{display:flex;justify-content:space-between;align-items:baseline;
  font-family:'Barlow Semi Condensed',sans-serif;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.holotune .row label b{font-weight:500;color:var(--gray)}
.holotune input[type=range]{width:100%;accent-color:#ffb020;background:transparent}
.holotune .swatches{display:flex;gap:6px;margin:4px 0 16px}
.holotune .sw{width:26px;height:26px;border:1px solid var(--edge);cursor:pointer;padding:0;
  transition:border-color .12s,box-shadow .12s}
.holotune .sw:hover,.holotune .sw[aria-pressed="true"]{border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 14px rgba(255,176,32,.25)}
.holotune .acts{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
@media(prefers-reduced-motion:reduce){.holostage *{animation:none!important}}

/* ---------- edit layer ---------- */
.editbar{display:none;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 18px}
body.editing .editbar{display:flex}
.ebtn{all:unset;cursor:pointer;padding:9px 18px;border:1px solid var(--edge);background:transparent;
  font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gray);transition:background .12s,color .12s,border-color .12s,box-shadow .12s}
.ebtn:hover,.ebtn:focus-visible{background:rgba(255,176,32,.07);color:var(--gold-hi);border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 22px rgba(255,176,32,.28)}
.ebtn.ghost{color:var(--dim)}
.editflag{font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold);margin-left:auto}

.rowtools{display:none;gap:6px;margin-top:16px}
body.editing .card .rowtools,body.editing .entry .rowtools,body.editing .tile .rowtools{display:flex}
.tbtn{all:unset;cursor:pointer;padding:5px 12px;border:1px solid var(--edge);
  font-family:'Barlow Semi Condensed',sans-serif;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);transition:color .12s,border-color .12s}
.tbtn:hover,.tbtn:focus-visible{color:var(--gold-hi);border-color:var(--gold)}

.veil{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.86);
  align-items:flex-start;justify-content:center;padding:56px 18px;overflow-y:auto}
.veil.open{display:flex}
.sheet{width:100%;max-width:560px;background:#000;border:1px solid var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 42px rgba(255,176,32,.22);padding:28px}
.sheet h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:.04em;
  text-transform:uppercase;color:var(--white);margin:0 0 4px}
.sheet .hint{font-size:13px;color:var(--dim);margin:0 0 20px;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:transparent;border:1px solid var(--edge);
  color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;padding:9px 12px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold)}
.field textarea{min-height:82px;resize:vertical;line-height:1.5}
.field select option{background:#000}
.trio{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet .actions{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
.note{font-size:12.5px;color:var(--dim);margin-top:16px;line-height:1.5}
.note b{color:var(--gold-hi);font-weight:600}
.toggles{display:flex;gap:18px;padding-top:4px}
.tog{display:flex;align-items:center;gap:8px;font-family:'Barlow Semi Condensed',sans-serif;
  font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);cursor:pointer}
.tog input{width:auto;accent-color:#ffb020}
.sheet.bare{max-width:340px;padding:20px;border-color:var(--edge);box-shadow:none}
.lock input{width:100%;background:transparent;border:1px solid var(--edge);color:var(--white);
  font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;outline:none}
.lock input:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.lock .actions{display:flex;gap:6px;margin-top:10px}
.lock .ebtn{flex:1;text-align:center;padding:8px 0;font-size:13px}
.lockerr{margin:10px 0 0;font-family:'Barlow Semi Condensed',sans-serif;font-size:12px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--dim);min-height:1em}

@media(max-width:860px){
  .wrap{padding:0 14px 50px}
  header{gap:14px}
  .brand{border-right:none;padding-right:0}
  .brand img{height:44px}
  nav{width:100%;overflow-x:auto}
  .tab{padding:10px 16px;font-size:14px;white-space:nowrap}
  .tab .n{display:none}
  .grid,.camprow{grid-template-columns:1fr}
  .camps{gap:38px}
  .card{min-height:0;padding:24px}
  .card h3{font-size:26px}
  .card .aur{padding-right:92px}
  .flag{top:24px;right:24px}
  .entry{grid-template-columns:1fr;gap:8px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

/* ============================================================
   HOLOGRAM
   Records carry `holo` (the image) and optional `holoTune`.
   Viewers get the projection. Tuning is edit mode only.
   ============================================================ */
const HOLO_KEYS=[
  ['hue','--h-hue','°',v=>v+'deg',-180,180,1],
  ['sat','--h-sat','',v=>v,0,8,.1],
  ['bright','--h-bright','',v=>v,.5,2,.01],
  ['contrast','--h-contrast','',v=>v,.5,2.5,.01],
  ['alpha','--h-alpha','',v=>v,.2,1,.01],
  ['glow','--h-glow','px',v=>v+'px',0,70,1],
  ['gap','--h-gap','px',v=>v+'px',2,10,1],
  ['strength','--h-strength','',v=>v,0,.6,.01],
  ['scan','--h-scan','s',v=>v+'s',.5,8,.1],
  ['sweep','--h-sweep','s',v=>v+'s',1,12,.1],
  ['split','--h-split','px',v=>v+'px',0,6,.1]
];
const HOLO_DEFAULTS={hue:160,sat:3.4,bright:1.08,contrast:1.25,alpha:.88,glow:26,
  gap:3,strength:.16,scan:2.4,sweep:4.5,split:1.4,tint:'#7fd8ff'};
const HOLO_TINTS=[['#7fd8ff','Imperial blue',160],['#8affd6','Signal green',110],
  ['#ffb020','Archive amber',0],['#ff7a6b','Distress red',-20],['#c9a8ff','Sith violet',210]];

function holoApply(stage,tune){
  const t={...HOLO_DEFAULTS,...(tune||{})};
  HOLO_KEYS.forEach(([k,varName,,fmt])=>stage.style.setProperty(varName,fmt(t[k])));
  stage.style.setProperty('--h-tint',t.tint);
  return t;
}

function wireHologram(rec){
  const stage=document.getElementById('holoStage'), btn=document.getElementById('apprBtn');
  if(!stage||!btn)return;

  if(!rec.holo){
    stage.innerHTML=`
      <div class="holoempty">
        <label class="ebtn" for="holoPick">Choose an image</label>
        <input type="file" id="holoPick" accept="image/*" style="display:none">
        <p class="note">A portrait on a dark background projects best. It is stored inside the page and can be tuned once loaded.</p>
      </div>`;
    document.getElementById('holoPick').onchange=e=>{
      const f=e.target.files[0]; if(!f)return;
      stage.querySelector('.note').textContent='Processing…';
      holoProcess(f,data=>{rec.holo=data;markDirty();render();
        setTimeout(()=>{const b=document.getElementById('apprBtn');if(b)b.click()},60);});
    };
    btn.onclick=()=>{
      const open=stage.classList.toggle('open');
      btn.textContent=open?'Cancel':'Add appearance';
    };
    return;
  }

  const url=rec.holo;
  stage.innerHTML=`
    <div class="rig">
      <div class="holo">
        <div class="layer bloom"><img src="${url}" alt=""></div>
        <div class="layer base"><img src="${url}" alt=""></div>
        <div class="layer split-a"><img src="${url}" alt=""></div>
        <div class="layer split-b"><img src="${url}" alt=""></div>
        <div class="layer scan mask"></div>
        <div class="layer sweep mask"></div>
        <img src="${url}" alt="" style="visibility:hidden">
      </div>
    </div>
    <div class="emitter"><span class="cone"></span><span class="disc"></span></div>
    <div class="holotune" id="holoTune"></div>`;
  stage.querySelectorAll('.mask').forEach(el=>{
    el.style.webkitMaskImage=`url('${url}')`;
    el.style.maskImage=`url('${url}')`;
  });
  const tune=holoApply(stage,rec.holoTune);

  btn.onclick=()=>{
    const open=stage.classList.toggle('open');
    btn.textContent=open?'Hide appearance':'Appearance';
    if(open)stage.scrollIntoView({behavior:'smooth',block:'nearest'});
  };

  /* tuning controls, only rendered for an unlocked editor */
  if(!document.body.classList.contains('editing'))return;
  const panel=document.getElementById('holoTune');
  panel.innerHTML=`
    <div class="swatches">${HOLO_TINTS.map(([hex,name])=>
      `<button class="sw" data-hex="${hex}" title="${name}" style="background:${hex}"
        aria-pressed="${hex===tune.tint}"></button>`).join('')}</div>
    <div class="grid2">${HOLO_KEYS.map(([k,,unit,,min,max,step])=>
      `<div class="row"><label>${k} <b id="ht-v-${k}">${tune[k]}${unit}</b></label>
       <input type="range" id="ht-${k}" min="${min}" max="${max}" step="${step}" value="${tune[k]}"></div>`).join('')}</div>
    <div class="acts">
      <button class="ebtn" id="htSave">Save appearance</button>
      <button class="ebtn ghost" id="htReset">Reset</button>
      <button class="ebtn ghost" id="htRemove">Remove image</button>
    </div>`;
  const current={...tune};
  HOLO_KEYS.forEach(([k,varName,unit,fmt])=>{
    const el=document.getElementById('ht-'+k), out=document.getElementById('ht-v-'+k);
    el.addEventListener('input',()=>{
      current[k]=+el.value;
      stage.style.setProperty(varName,fmt(el.value));
      out.textContent=el.value+unit;
    });
  });
  panel.querySelectorAll('.sw').forEach(b=>b.onclick=()=>{
    current.tint=b.dataset.hex;
    stage.style.setProperty('--h-tint',current.tint);
    panel.querySelectorAll('.sw').forEach(x=>x.setAttribute('aria-pressed',x===b));
  });
  document.getElementById('htSave').onclick=()=>{
    rec.holoTune={...current}; markDirty();
    document.getElementById('htSave').textContent='Saved';
    setTimeout(()=>{const b=document.getElementById('htSave');if(b)b.textContent='Save appearance'},1400);
  };
  document.getElementById('htReset').onclick=()=>{
    delete rec.holoTune; markDirty(); render();
  };
  document.getElementById('htRemove').onclick=()=>{
    if(!confirm('Remove the hologram image from this record?'))return;
    delete rec.holo; delete rec.holoTune; markDirty(); render();
  };
}

/* Downscale an upload, keeping transparency intact.
   The masks and blending both rely on the alpha channel, so a PNG cutout
   must stay a PNG cutout — flattening it onto black produces a lit rectangle. */
function holoProcess(file,cb){
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=900, sc=Math.min(1,max/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      cb(c.toDataURL('image/png'));
    };
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

      const links=[];
      for(let i=0;i<3;i++){const l=val('ll'+i),u=val('lu'+i);if(l)links.push({label:l,url:u||'#'})}
      if(links.length)rec.links=links;
      const holo=pendingHolo||it.holo;
      if(holo)rec.holo=holo;
      if(it.holoTune)rec.holoTune=it.holoTune;
    }
    if(!rec.name){alert('A name is required.');return}
    if(index==null)sec.items.unshift(rec); else sec.items[index]=rec;
    markDirty(); closeSheet(); render();
  };
}

function pageForm(pid){
  const p=PAGES[pid]||{};
  openSheet(`
    <h2>Edit tile</h2>
    <p class="hint">Shared by the home page and the campaigns list.</p>
    <div class="field"><label>Title</label><input id="p_title" value="${esc(p.title)}"></div>
    <div class="field"><label>Subtitle</label><input id="p_eyebrow" value="${esc(p.eyebrow)}"></div>
    <div class="field"><label>Description</label><textarea id="p_blurb">${esc(p.blurb)}</textarea></div>
    <div class="field"><label>Background image URL</label><input id="p_img" value="${esc(p.img)}" placeholder="https://…"></div>
    <div class="field"><label>Or upload an image</label><input type="file" id="p_file" accept="image/*"></div>
    <div class="field"><label>Badges</label>
      <div class="toggles">
        <label class="tog"><input type="checkbox" id="p_feat" ${p.featured?'checked':''}> Featured</label>
        <label class="tog"><input type="checkbox" id="p_rec" ${p.recruiting?'checked':''}> Recruiting</label>
      </div>
    </div>
    <div class="actions">
      <button class="ebtn" id="pgSave">Save tile</button>
      <button class="ebtn ghost" id="pgClear">Remove image</button>
      <button class="ebtn ghost" id="pgCancel">Cancel</button>
    </div>
    <p class="note" id="pgMsg">Uploaded images are scaled down and stored inside the page file.</p>`);
  const msg=document.getElementById('pgMsg');
  document.getElementById('p_file').onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    msg.textContent='Processing image…';
    const img=new Image();
    img.onload=()=>{
      const max=1400, sc=Math.min(1,max/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const data=c.toDataURL('image/jpeg',0.72);
      document.getElementById('p_img').value=data;
      msg.textContent='Image ready. '+Math.round(data.length/1400)+' KB once saved.';
      URL.revokeObjectURL(img.src);
    };
    img.onerror=()=>{msg.textContent='That file could not be read as an image.'};
    img.src=URL.createObjectURL(f);
  };
  document.getElementById('pgCancel').onclick=closeSheet;
  document.getElementById('pgClear').onclick=()=>{document.getElementById('p_img').value='';msg.textContent='Image cleared. Save to apply.'};
  document.getElementById('pgSave').onclick=()=>{
    const v=id=>document.getElementById(id).value.trim();
    PAGES[pid]={
      title:v('p_title'), eyebrow:v('p_eyebrow'), blurb:v('p_blurb'),
      ...(v('p_img')?{img:v('p_img')}:{}),
      ...(document.getElementById('p_feat').checked?{featured:true}:{}),
      ...(document.getElementById('p_rec').checked?{recruiting:true}:{})
    };
    markDirty(); closeSheet(); render();
  };
}

function deleteRecord(secKey,index){
  const sec=DATA[secKey];
  if(!confirm('Delete "'+sec.items[index].name+'"? This cannot be undone until you reload without publishing.'))return;
  sec.items.splice(index,1); detail=null; markDirty(); render();
}

/* ---- serialise DATA back into the file ---- */
function serialiseData(){
  return 'const DATA = '+JSON.stringify(DATA,null,2)+';\n\nconst PAGES = '+JSON.stringify(PAGES,null,2)+';';
}
function rebuildFile(sourceText){
  const start=sourceText.indexOf('const DATA = {');
  const end=sourceText.indexOf('/* ========================= end data ========================= */');
  if(start<0||end<0)throw new Error('Could not locate the data block in the file.');
  return sourceText.slice(0,start)+serialiseData()+'\n'+sourceText.slice(end);
}

/* ---- download ---- */
async function downloadFile(){
  const res=await fetch(location.href,{cache:'no-store'});
  const txt=rebuildFile(await res.text());
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/html'}));
  a.download='index.html'; a.click(); URL.revokeObjectURL(a.href);
}

/* ---- publish straight to GitHub ---- */
function publishForm(){
  const saved=sessionStorage.getItem('ghToken')||'';
  openSheet(`
    <h2>Publish to GitHub</h2>
    <p class="hint">Commits the current records to <b>${REPO_OWNER}/${REPO_NAME}</b>. The live site updates about a minute later.</p>
    <div class="field"><label>Personal access token</label><input type="password" id="tok" value="${esc(saved)}" autocomplete="off"></div>
    <div class="field"><label>Commit message</label><input id="msg" value="Update archive records"></div>
    <div class="actions">
      <button class="ebtn" id="pubGo">Publish</button>
      <button class="ebtn ghost" id="pubNo">Cancel</button>
    </div>
    <p class="note" id="pubMsg">Create a token at github.com → Settings → Developer settings → Fine-grained tokens, with <b>Contents: Read and write</b> on this repository only. It is kept for this browser tab and never written into the page.</p>`);
  document.getElementById('pubNo').onclick=closeSheet;
  document.getElementById('pubGo').onclick=async()=>{
    const tok=document.getElementById('tok').value.trim();
    const msg=document.getElementById('msg').value.trim()||'Update archive records';
    const out=document.getElementById('pubMsg');
    if(!tok){out.textContent='A token is required.';return}
    out.textContent='Publishing…';
    try{
      const api=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
      const h={Authorization:'Bearer '+tok,Accept:'application/vnd.github+json'};
      const meta=await fetch(api,{headers:h});
      if(!meta.ok)throw new Error('Could not read the file ('+meta.status+').');
      const info=await meta.json();
      const raw=atob(info.content.replace(/\n/g,''));
      const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      const current=new TextDecoder().decode(arr);
      const updated=rebuildFile(current);
      const bytes=new TextEncoder().encode(updated);
      let bin=''; const CH=0x8000;
      for(let i=0;i<bytes.length;i+=CH){bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH))}
      const b64=btoa(bin);
      const put=await fetch(api,{method:'PUT',headers:h,
        body:JSON.stringify({message:msg,content:b64,sha:info.sha})});
      if(!put.ok)throw new Error('Commit rejected ('+put.status+').');
      sessionStorage.setItem('ghToken',tok);
      dirty=false; dirtyFlag.textContent='Published';
      out.innerHTML='Committed. The live site refreshes in about a minute.';
    }catch(err){out.textContent=err.message}
  };
}

document.getElementById('addBtn').onclick=()=>recordForm(tab,null);
function syncAddBtn(){
  const hasItems=!!DATA[tab].items;
  document.getElementById('addBtn').style.display=hasItems?'':'none';
}
document.getElementById('pubBtn').onclick=publishForm;
document.getElementById('dlBtn').onclick=downloadFile;
document.getElementById('lockBtn').onclick=()=>{
  if(dirty&&!confirm('There are unsaved changes. Lock anyway?'))return;
  document.body.classList.remove('editing');render();
};
view.addEventListener('click',e=>{
  const tile=e.target.closest('.tile');
  const hit=e.target.closest('.card');
  if(hit&&!e.target.closest('.tbtn')){
    detail=+hit.dataset.i; render(); window.scrollTo(0,0); return;
  }
  if(tile&&!e.target.closest('.tbtn')){page=tile.dataset.page;render();window.scrollTo(0,0);return}
  const b=e.target.closest('.tbtn'); if(!b)return;
  if(b.dataset.act==='page'){pageForm(b.dataset.pid);return}
  const i=+b.dataset.i;
  if(b.dataset.act==='edit')recordForm(tab,i); else deleteRecord(tab,i);
});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});

q.oninput=render;

/* Aurebesh scramble on hover */
const GLYPHS="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function scramble(el){
  if(reduced||el.dataset.busy)return;
  const target=el.dataset.text||el.textContent;
  el.dataset.text=target; el.dataset.busy="1";
  const len=target.length; let frame=0;
  const settle=target.split('').map((_,i)=>6+Math.floor(i*1.6+Math.random()*6));
  const HOLD=4;
  const held=target.split('').map(()=>GLYPHS[Math.floor(Math.random()*GLYPHS.length)]);
  el._scr=setInterval(()=>{
    const id=el._scr;
    let out='';
    for(let i=0;i<len;i++){
      const ch=target[i];
      if(ch===' '||frame>=settle[i]){out+=ch;continue}
      if(frame%HOLD===0)held[i]=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      out+=held[i];
    }
    el.textContent=out;
    if(frame++>Math.max(...settle))stopScramble(el);
  },35);
}
function stopScramble(el){
  if(!el||!el._scr)return;
  clearInterval(el._scr); el._scr=null;
  el.textContent=el.dataset.text||el.textContent;
  delete el.dataset.busy;
}
view.addEventListener('mouseover',e=>{
  const card=e.target.closest('.card,.tile'); if(!card)return;
  if(card.contains(e.relatedTarget))return;
  const a=card.querySelector('.aur'); if(a)scramble(a);
});
view.addEventListener('mouseout',e=>{
  const card=e.target.closest('.card,.tile'); if(!card)return;
  if(card.contains(e.relatedTarget))return;
  stopScramble(card.querySelector('.aur'));
});

render();

const total=Object.values(DATA).reduce((n,s)=>n+(s.items?s.items.length:0),0);
document.getElementById('clock').textContent=`${total} RECORDS ON FILE`;
</script>
